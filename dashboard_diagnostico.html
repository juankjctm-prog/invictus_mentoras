<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Master Dashboard - Diagnósticos</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-absolute: #000000;
            --bg-surface: #0a0a0c;
            --border-subtle: rgba(255, 255, 255, 0.06);
            --accent-fire: #FF5E00;
            --accent-fire-glow: rgba(255, 94, 0, 0.2);
            --accent-water: #00C6FF;
            --text-primary: #FFFFFF;
            --text-secondary: #8A8F98;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-absolute);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            font-family: 'Outfit';
            font-size: 2.5rem;
            background: linear-gradient(135deg, var(--accent-fire), var(--accent-water));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: var(--text-secondary);
            margin-top: 10px;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border-subtle);
            border-radius: 20px;
            padding: 20px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 15px;
            border-bottom: 1px solid var(--border-subtle);
        }

        th {
            font-family: 'Outfit';
            font-weight: 600;
            color: var(--accent-water);
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        td {
            font-size: 0.95rem;
        }

        .tag {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
        }
        
        .tag-mentora { background: rgba(255, 94, 0, 0.2); color: var(--accent-fire); }
        .tag-mentoreada { background: rgba(0, 198, 255, 0.2); color: var(--accent-water); }

        .score-box {
            font-family: 'Outfit';
            font-weight: 700;
            font-size: 1.1rem;
        }

        .brechas-list {
            margin: 0;
            padding-left: 20px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .btn-refresh {
            background: rgba(255,255,255,0.1);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 20px;
            font-family: 'Outfit';
            transition: all 0.3s;
        }

        .btn-refresh:hover {
            background: var(--accent-fire);
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>

    <header>
        <h1>Master Dashboard</h1>
        <p>Centro de monitoreo de diagnósticos de Mentoras y Mentoreadas</p>
    </header>

    <div style="width: 100%; max-width: 1200px; text-align: right;">
        <button class="btn-refresh" onclick="loadData()">↻ Actualizar Datos</button>
    </div>

    <div class="container">
        <table>
            <thead>
                <tr>
                    <th>Fecha</th>
                    <th>PIN</th>
                    <th>Rol</th>
                    <th>PPM / Comprensión</th>
                    <th>Score General</th>
                    <th>Brechas Críticas (≤ 40%)</th>
                </tr>
            </thead>
            <tbody id="table-body">
                <tr><td colspan="6" class="empty-state">Cargando datos desde Supabase...</td></tr>
            </tbody>
        </table>
    </div>

    <!-- SUPABASE INIT -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://unbaagnuwdhavqkajory.supabase.co';
        const supabaseKey = 'sb_publishable_8G_qiAoStdmRsEwPfvaa0g__2XlfLjV';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function loadData() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '<tr><td colspan="6" class="empty-state">Cargando datos...</td></tr>';

            const { data, error } = await _supabase
                .from('diagnostico_resultados')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                console.error(error);
                tbody.innerHTML = '<tr><td colspan="6" class="empty-state">Error al cargar o la tabla no existe aún. Revisa Supabase.</td></tr>';
                return;
            }

            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="empty-state">No hay resultados registrados todavía.</td></tr>';
                return;
            }

            let html = '';
            data.forEach(row => {
                const isMentora = row.user_role.toLowerCase().includes('mentora');
                const tagClass = isMentora ? 'tag-mentora' : 'tag-mentoreada';
                
                const fecha = new Date(row.created_at).toLocaleDateString() + ' ' + new Date(row.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                
                const r = row.resultados;
                const ppm = r?.lectura?.ppm || '--';
                const comp = r?.lectura?.comprension || '--';
                
                const scoreMentoria = r?.mentoria?.total ? r.mentoria.total + '%' : 'N/A';
                
                let brechas = r?.brechas || {};
                let criticas = Object.entries(brechas).filter(([k,v]) => v <= 40);
                
                let brechasHtml = '<ul class="brechas-list">';
                if (criticas.length === 0) {
                    brechasHtml += '<li>Ninguna</li>';
                } else {
                    criticas.forEach(([k,v]) => {
                        brechasHtml += `<li>${k} (${v}%)</li>`;
                    });
                }
                brechasHtml += '</ul>';

                html += `
                    <tr>
                        <td>${fecha}</td>
                        <td style="font-weight:bold; letter-spacing:1px;">${row.user_pin}</td>
                        <td><span class="tag ${tagClass}">${row.user_role}</span></td>
                        <td><span class="score-box">${ppm}</span> / ${comp}%</td>
                        <td><span class="score-box" style="color:var(--accent-fire);">${scoreMentoria}</span></td>
                        <td>${brechasHtml}</td>
                    </tr>
                `;
            });
            tbody.innerHTML = html;
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
